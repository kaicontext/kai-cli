name: Bug Report
description: Report a bug in Kai
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        When I run `kai ci plan`, the output shows 0 selective targets even though files were changed.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. `kai init`
        2. `kai capture .`
        3. Edit `src/index.ts` (add a barrel re-export)
        4. `kai capture .`
        5. `kai ci plan`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Kai Version
      description: Output of `kai --version`
      placeholder: "kai version 0.9.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (ARM)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: |
        Anything else? Relevant config, CI environment, repo size, language mix, etc.
        If possible, include the output of `kai ci plan --explain`.
