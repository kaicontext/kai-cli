# GitHub Actions CI for the Kai CLI (public repo: kaicontext/kai-cli)
#
# Builds the single `kai` binary (CLI statically linked with the private
# kai-core engine) for linux+darwin / amd64+arm64, and on version tags
# dual-publishes them to BOTH the public Google Cloud Storage bucket
# gs://kaicontext-releases (keyless via Workload Identity Federation) and this
# repo's GitHub Releases (so get.kaicontext.com / install.sh / `kai update`
# keep working off /releases/latest).
#
# The engine lives in two PRIVATE Go modules: github.com/kaicontext/kai-core
# (primitives) and github.com/kaicontext/kai-engine (agent loop, planner,
# tools, providers). Every job that resolves Go dependencies mints a
# short-lived (1h) installation token from an org-owned GitHub App
# (Contents: read on BOTH kaicontext/kai-core and kaicontext/kai-engine), so
# no personal PAT or long-lived key is involved. Requires two secrets on this
# repo: KAI_CORE_APP_CLIENT_ID, KAI_CORE_APP_PRIVATE_KEY.
# NOTE: the GitHub App must be granted access to kai-engine (the new repo) —
# otherwise the minted token can't fetch it and every build fails.

name: CI

on:
  push:
    branches: ['**']
    tags: ['*']
  pull_request:
    branches: [main]

env:
  # Tell the Go toolchain not to use the public proxy/sum DB for our modules.
  GOPRIVATE: github.com/kaicontext/*

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Mint short-lived kai-core read token
        uses: actions/create-github-app-token@v3
        id: core-token
        with:
          client-id: ${{ secrets.KAI_CORE_APP_CLIENT_ID }}
          private-key: ${{ secrets.KAI_CORE_APP_PRIVATE_KEY }}
          owner: kaicontext
          repositories: kai-core,kai-engine
      - name: Authenticate to private kai-core module
        run: git config --global url."https://x-access-token:${{ steps.core-token.outputs.token }}@github.com/".insteadOf "https://github.com/"
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Test
        run: CGO_ENABLED=1 go test -timeout 5m -skip 'TestRunCompletion' ./...

  # Engine module-boundary check (see internal/boundary). kai-cli consumes
  # kai-core and kai-engine as versioned module dependencies; this fails the
  # build if either module's source is vendored in, if go.mod carries a
  # `replace` for either (which only resolves against a local checkout and
  # breaks the build for everyone else), or if engine-owned content is copied
  # in. Module hygiene that keeps the dependency boundary clean.
  #
  # Deliberately SECRET-LESS: it only `go test`s the boundary package, which
  # imports the standard library only, so it needs no engine fetch and mints
  # no GitHub-App token. That also lets it run for fork-based pull requests,
  # which cannot mint the org token (and would otherwise fail the `test` job at
  # the token-mint step). Mark this a required status check in branch
  # protection once it is proven green on main.
  boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Check engine module boundary
        env:
          CGO_ENABLED: '0'
        run: go test -count=1 ./internal/boundary/...

  build-linux:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Mint short-lived kai-core read token
        uses: actions/create-github-app-token@v3
        id: core-token
        with:
          client-id: ${{ secrets.KAI_CORE_APP_CLIENT_ID }}
          private-key: ${{ secrets.KAI_CORE_APP_PRIVATE_KEY }}
          owner: kaicontext
          repositories: kai-core,kai-engine
      - name: Authenticate to private kai-core module
        run: git config --global url."https://x-access-token:${{ steps.core-token.outputs.token }}@github.com/".insteadOf "https://github.com/"
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y gcc gcc-aarch64-linux-gnu
      - name: Build linux/amd64
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="0.0.0-dev+${GITHUB_SHA::7}"; fi
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${VERSION}" -o kai-linux-amd64 ./cmd/kai
          gzip -kf kai-linux-amd64
      - name: Build linux/arm64
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="0.0.0-dev+${GITHUB_SHA::7}"; fi
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc go build -ldflags="-s -w -X main.Version=${VERSION}" -o kai-linux-arm64 ./cmd/kai
          gzip -kf kai-linux-arm64
      - name: Authenticate to Google Cloud
        if: startsWith(github.ref, 'refs/tags/')
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1093447114400/locations/global/workloadIdentityPools/github/providers/github
          service_account: kai-release-uploader@preplanai.iam.gserviceaccount.com
      - name: Set up Cloud SDK
        if: startsWith(github.ref, 'refs/tags/')
        uses: google-github-actions/setup-gcloud@v2
      - name: Upload linux binaries to GCS
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for asset in kai-linux-amd64.gz kai-linux-arm64.gz; do
            gcloud storage cp "$asset" "gs://kaicontext-releases/kai-cli/v${VERSION}/${asset}"
            gcloud storage cp "$asset" "gs://kaicontext-releases/kai-cli/latest/${asset}"
          done

  build-darwin:
    runs-on: macos-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Mint short-lived kai-core read token
        uses: actions/create-github-app-token@v3
        id: core-token
        with:
          client-id: ${{ secrets.KAI_CORE_APP_CLIENT_ID }}
          private-key: ${{ secrets.KAI_CORE_APP_PRIVATE_KEY }}
          owner: kaicontext
          repositories: kai-core,kai-engine
      - name: Authenticate to private kai-core module
        run: git config --global url."https://x-access-token:${{ steps.core-token.outputs.token }}@github.com/".insteadOf "https://github.com/"
      - name: Build darwin/arm64
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="0.0.0-dev+${GITHUB_SHA::7}"; fi
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${VERSION}" -o kai-darwin-arm64 ./cmd/kai
          gzip -kf kai-darwin-arm64
      - name: Build darwin/amd64
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="0.0.0-dev+${GITHUB_SHA::7}"; fi
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${VERSION}" -o kai-darwin-amd64 ./cmd/kai
          gzip -kf kai-darwin-amd64
      - name: Authenticate to Google Cloud
        if: startsWith(github.ref, 'refs/tags/')
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1093447114400/locations/global/workloadIdentityPools/github/providers/github
          service_account: kai-release-uploader@preplanai.iam.gserviceaccount.com
      - name: Set up Cloud SDK
        if: startsWith(github.ref, 'refs/tags/')
        uses: google-github-actions/setup-gcloud@v2
      - name: Upload darwin binaries to GCS
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for asset in kai-darwin-arm64.gz kai-darwin-amd64.gz; do
            gcloud storage cp "$asset" "gs://kaicontext-releases/kai-cli/v${VERSION}/${asset}"
            gcloud storage cp "$asset" "gs://kaicontext-releases/kai-cli/latest/${asset}"
          done

  # Dual-publish on version tags. The binaries are uploaded directly to GCS by
  # the build-linux/build-darwin jobs (to both v<X.Y.Z>/ and latest/). This job
  # (1) records the `latest/VERSION` marker so GCS installers can discover the
  # current version, and (2) recreates the GitHub Release — pulling the same
  # binaries back down from GCS (instead of Actions artifacts) and re-attaching
  # them alongside install.sh, so get.kaicontext.com and `kai update` keep
  # working off /releases/latest.
  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1093447114400/locations/global/workloadIdentityPools/github/providers/github
          service_account: kai-release-uploader@preplanai.iam.gserviceaccount.com
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Publish VERSION marker
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          printf '%s' "$VERSION" > VERSION
          gcloud storage cp VERSION "gs://kaicontext-releases/kai-cli/latest/VERSION"
      - name: Stage release assets (download binaries from GCS)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          for asset in kai-linux-amd64.gz kai-linux-arm64.gz kai-darwin-arm64.gz kai-darwin-amd64.gz; do
            gcloud storage cp "gs://kaicontext-releases/kai-cli/v${VERSION}/${asset}" "release/${asset}"
          done
          # The curl installer itself — get.kaicontext.com redirects to
          # .../releases/latest/download/install.sh, so ship it as an asset.
          cp install.sh release/
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
